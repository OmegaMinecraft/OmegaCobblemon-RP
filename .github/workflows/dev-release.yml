name: Create OmegaCobblemon Dev Resource Pack Release

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  create-dev-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Create Resource Pack Archive
      uses: thedoctor0/zip-release@0.7.5
      with:
        type: 'zip'
        filename: 'omegacobblemon-dev-resource-pack.zip'
        exclusions: |
          *.git*
          *.github*
          *node_modules*
          *.editorconfig
          *.gitignore
          *.md
          README*
          LICENSE*
          .DS_Store
          Thumbs.db
    
    - name: Verify archive and generate hashes
      run: |
        echo "Dev archive created successfully!"
        ls -la omegacobblemon-dev-resource-pack.zip
        echo "Archive contents (first 25 entries):"
        unzip -l omegacobblemon-dev-resource-pack.zip | head -25
        echo ""
        echo "Generating hashes..."
        echo "SHA256: $(sha256sum omegacobblemon-dev-resource-pack.zip | cut -d' ' -f1)"
        echo "SHA1: $(sha1sum omegacobblemon-dev-resource-pack.zip | cut -d' ' -f1)"
        echo "MD5: $(md5sum omegacobblemon-dev-resource-pack.zip | cut -d' ' -f1)"
        echo "PACK_SHA256=$(sha256sum omegacobblemon-dev-resource-pack.zip | cut -d' ' -f1)" >> $GITHUB_ENV
        echo "PACK_SHA1=$(sha1sum omegacobblemon-dev-resource-pack.zip | cut -d' ' -f1)" >> $GITHUB_ENV
        echo "PACK_MD5=$(md5sum omegacobblemon-dev-resource-pack.zip | cut -d' ' -f1)" >> $GITHUB_ENV
        echo "PACK_SIZE=$(stat -f%z omegacobblemon-dev-resource-pack.zip 2>/dev/null || stat -c%s omegacobblemon-dev-resource-pack.zip)" >> $GITHUB_ENV
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: dev-release
        name: "Latest OmegaCobblemon Resource Pack (Development)"
        body: |
          🚧 **OmegaCobblemon Resource Pack - Development Build**
          
          **⚠️ WARNING: This is a development version for testing purposes only!**
          
          ## 🎮 Compatibility
          - **Minecraft Version:** 1.21.1
          - **Pack Format:** 48
          
          ## 📥 Installation & Usage (Testing Only)
          - **Manual Download:** Click `omegacobblemon-dev-resource-pack.zip` below
          - **Server Resource Pack URL:** `https://github.com/${{ github.repository }}/releases/download/dev-release/omegacobblemon-dev-resource-pack.zip`
          - **SHA1:** `${{ env.PACK_SHA1 }}`
          
          ## 🔐 File Verification
          **File Size:** ${{ env.PACK_SIZE }} bytes
          **SHA256:** `${{ env.PACK_SHA256 }}`
          **SHA1:** `${{ env.PACK_SHA1 }}`
          **MD5:** `${{ env.PACK_MD5 }}`
          
          ## 📊 Build Information
          **Generated:** ${{ github.event.head_commit.timestamp }}
          **Workflow Run:** [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          **Branch:** ${{ github.ref_name }}
          
          ---
          🔄 **For Production Use:** Switch to the [main release](https://github.com/${{ github.repository }}/releases/tag/release) once testing is complete.
        files: |
          omegacobblemon-dev-resource-pack.zip
        prerelease: true
        make_latest: false
        generate_release_notes: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
